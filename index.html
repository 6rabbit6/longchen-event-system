<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龙辰赛事系统测试入口</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #d80046;
        --text: #1f2430;
        --muted: #6f7785;
        --line: #eceff4;
        --bg: #f5f7fb;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 48px 20px;
      }

      .hero {
        padding: 28px 0 22px;
      }

      .hero span {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fff0f5;
        color: var(--primary);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(30px, 6vw, 46px);
        line-height: 1.12;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .entry-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-top: 28px;
      }

      .entry-card {
        display: flex;
        min-height: 164px;
        flex-direction: column;
        justify-content: space-between;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 14px 35px rgba(31, 36, 48, 0.08);
      }

      .entry-card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 21px;
      }

      .entry-card small {
        color: var(--muted);
        line-height: 1.6;
      }

      .entry-card b {
        color: var(--primary);
        font-size: 14px;
      }

      @media (max-width: 720px) {
        main {
          padding-top: 28px;
        }

        .entry-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span>GitHub Pages 测试入口</span>
        <h1>龙辰赛事业务系统</h1>
        <p>这里是同一仓库下的静态测试总入口。平台、报名系统、后台管理分别保持独立子目录，方便后续部署和联调。</p>
      </section>

      <section class="entry-grid" aria-label="系统入口">
        <a class="entry-card" href="./event-platform/">
          <div>
            <strong>进入赛事平台</strong>
            <small>浏览赛事列表、热门赛事和快捷入口。</small>
          </div>
          <b>打开平台</b>
        </a>
        <a class="entry-card" href="./registration-system/">
          <div>
            <strong>进入报名系统</strong>
            <small>单赛事报名页，通常由平台携带 eventId 跳转进入。</small>
          </div>
          <b>打开报名</b>
        </a>
        <a class="entry-card" href="./event-admin/">
          <div>
            <strong>进入后台管理</strong>
            <small>赛事管理、报名审核、导出正式名单。</small>
          </div>
          <b>打开后台</b>
        </a>
      </section>
    </main>
  </body>
</html>
